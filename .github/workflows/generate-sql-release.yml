name: Generate SQL Release Bundle

on:
  push:
    branches:
      - Release
    paths:
      - 'TestFileCombineActions/DB/SP/**'
      - 'TestFileCombineActions/DB/Data/**'
      - '.github/workflows/**'

jobs:
  generate-bundle:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      
    env:
      # Directories that will be checked/used
      
      # SP scripts folder to search.
      DIR_SP: "TestFileCombineActions/DB/SP"
      # Data scripts folder to search.
      DIR_DATA: "TestFileCombineActions/DB/Data"
      # Where to output final file.
      DIR_OUTPUT: "output/sqlfiles"
      
      # Placeholders - no need to change
      TEMP_SQL: "temp_bundle.sql"
      REPORT_FILE: "summary_report.md"
      REPO_NAME: ${{ github.event.repository.name }}
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          # Removed since we r regexing for release branches
          ref: ${{ github.ref_name }}
          #ref: Release  # Ensure we are working on the Release branch files
          fetch-depth: 0 # This fetches all branches and history

      - name: Process SQL Changes
        id: process_sql
        shell: bash
        run: |
        
          # Initialize Report and Temp SQL file
          touch $TEMP_SQL

          # Initialize report
          echo "### SQL Processing Report" > $REPORT_FILE
          echo "| File Type | Status | File Name |" >> $REPORT_FILE
          echo "| :--- | :--- | :--- |" >> $REPORT_FILE

          # Handle Git History safely
          # Only unshallow if the repo actually is shallow
          if [ -f .git/shallow ]; then
            git fetch --unshallow --tags
          else
            git fetch --all --tags
          fi
          
          # Always generate the new timestamp for the NEW filename
          TIMESTAMP=$(date +"%Y%m%d%H%M%S")
          FINAL_FILENAME="${TIMESTAMP}__${REPO_NAME}.sql"
          FULL_PATH="${DIR_OUTPUT}/${FINAL_FILENAME}"

          # Define patterns for recursive SQL search
          TARGET_PATTERNS="$DIR_SP/**/*.sql $DIR_DATA/**/*.sql"

          # Find the LAST bundle commit hash (instead of timestamp)
          # LAST_BUNDLE_COMMIT=$(git log --fixed-strings --grep="Auto-generated SQL bundle" -n 1 --format="%H" || echo "")
          LAST_BUNDLE_COMMIT=$(git log -1 --author="github-actions\[bot\]" --format="%H" -- "$DIR_OUTPUT" || echo "")
          LAST_RELEASE_DATE=""
          
          # Identify changed files and log info
          if [ -n "$LAST_BUNDLE_COMMIT" ]; then
              # We still want to know the "Last Run" date for your summary report
              # This pulls the date of the last bundle commit
              LAST_RELEASE_DATE=$(git log -1 --format=%ai $LAST_BUNDLE_COMMIT)
              echo "Result: Processing changes since last bundle ($LAST_BUNDLE_COMMIT) from $LAST_RELEASE_DATE"
                
              # Get recursive SQL changes since that commit
              FILES=$(git diff --name-only "$LAST_BUNDLE_COMMIT" HEAD -- $TARGET_PATTERNS | sort -u)
                
              # Get commit titles for the changelog
              # COMMIT_TITLES=$(git log "$LAST_BUNDLE_COMMIT..HEAD" --no-merges --pretty=format:"%ad - %h - %s" --date=format:'%Y-%m-%d %H:%M:%S' | grep -v "Auto-generated SQL bundle" | sort -u)
          else
              echo "Result: No previous bundle found. Processing all history for $TARGET_PATTERNS"
              # LAST_RELEASE_DATE="Beginning of Time"
               
              # Get all SQL files currently in the folders
              FILES=$(git ls-files -- $TARGET_PATTERNS | sort -u)
                
              # Get all commit titles since the start
              START_POINT=$(git rev-list --max-parents=0 HEAD)
              # COMMIT_TITLES=$(git log "$START_POINT..HEAD" --no-merges --pretty=format:"%ad - %h - %s" --date=format:'%Y-%m-%d %H:%M:%S' | grep -v "Auto-generated SQL bundle" | sort -u)
          fi

          # Ensure output directory exists
          mkdir -p "$DIR_OUTPUT"

          # Initialize counters
          SP_COUNT=0
          DATA_COUNT=0
          ERRORS=0

          for FILE in $FILES; do
              # Skip if file doesn't exist (deleted) or isn't in our target folders
              if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then continue; fi
              
              # --- STORED PROCEDURES ---
              if [[ $FILE == "$DIR_SP/"* && $FILE == *.sql ]]; then
                  # Clean Windows line endings for reliable regex matching
                  CONTENT=$(cat "$FILE" | tr -d '\r' | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}')
                  
                  # Validation for CREATE OR ALTER PROCEDURE
                  if [[ ! "$CONTENT" =~ ([[:space:]]*(GO)?)*[[:space:]]*CREATE[[:space:]]+OR[[:space:]]+ALTER[[:space:]]+PROCEDURE ]]; then
                      echo "| SP | FAILED | $FILE |" >> $REPORT_FILE
                      echo "::error::Validation Failed: File '$FILE' is missing 'CREATE OR ALTER PROCEDURE'."
                      ERRORS=$((ERRORS + 1))
                      continue
                  fi

                  # Remove leading n trailing GOs, newlines from start and end only (Case Insensitive)
                  CLEAN_CONTENT=$(echo "$CONTENT" | sed -e :a -e '/^\([[:space:]]*GO[[:space:]]*\|[[:space:]]*\)$/I{N;ba' -e '}' | sed -e :a -e '/^\([[:space:]]*GO[[:space:]]*\|[[:space:]]*\)$/I{$d;N;ba' -e '}')
                  {
                      echo "-- $DIR_SP/$(basename "$FILE")"
                      # We ONLY echo GO if the CLEAN_CONTENT doesn't already start with one
                      [[ ! "$CLEAN_CONTENT" =~ ^[[:space:]]*GO ]] && echo "GO"
                      echo "$CLEAN_CONTENT"
                      echo "" # Single newline for separation
                  } >> "$TEMP_SQL"
                  
                  SP_COUNT=$((SP_COUNT + 1))
                  echo "| SP | Added | $FILE |" >> $REPORT_FILE

              # --- DATA SCRIPTS (Data/ folder) ---
              elif [[ $FILE == "$DIR_DATA/"* && $FILE == *.sql ]]; then
                  # Get just the diffs since that timestamp
                  # Inside the Data loop
                  if [ -z "$LAST_RELEASE_TS" ]; then
                      RAW_DIFF=$(git log "$START_POINT..HEAD" -p --unified=0 -I$'\r' --ignore-cr-at-eol "$FILE")
                  else
                      RAW_DIFF=$(git log --since="$LAST_RELEASE_TS" -p --unified=0 -I$'\r' --ignore-cr-at-eol "$FILE")
                  fi
                  
                  DIFF_CHANGES=$(echo "$RAW_DIFF" | tail -n +5 | grep -E "^\+" | grep -Ev '^\+\+\+' | sed 's/^\+//g' | tr -d '\r' | sed 's/[[:space:]]*$//')
                  
                  if [ -n "$DIFF_CHANGES" ]; then
                      # Strip leading/trailing GOs from the diff only
                      CLEAN_DIFF=$(echo "$DIFF_CHANGES" | sed -e :a -e '/^\([[:space:]]*GO[[:space:]]*\|[[:space:]]*\)$/I{N;ba' -e '}' | sed -e :a -e '/^\([[:space:]]*GO[[:space:]]*\|[[:space:]]*\)$/I{$d;N;ba' -e '}')
                      
                      {
                          echo "-- $DIR_DATA/$(basename "$FILE") (Diff)"
                          [[ ! "$CLEAN_DIFF" =~ ^[[:space:]]*GO ]] && echo "GO"
                          echo "$CLEAN_DIFF"
                          echo "" # Single newline for separation
                      } >> "$TEMP_SQL"
                      
                      DATA_COUNT=$((DATA_COUNT + 1))
                      echo "| Data | Diffed | $FILE |" >> $REPORT_FILE
                  fi
              fi
          done

          # BUILD CHANGELOG (Requested Format)
          
          # Format: <date> - <commit hash> - <commit msg>
          if [ -z "$LAST_RELEASE_DATE" ]; then
              echo -e "\n### Changelog (from start of branch to now):" >> $REPORT_FILE
              CHANGELOG=$(git log "$START_POINT..HEAD" --no-merges --pretty=format:"%ad - %h - %s" --date=format:'%Y-%m-%d %H:%M:%S' | grep -v "Auto-generated SQL bundle")
          else
              echo -e "\n### Changelog (from last release on $LAST_RELEASE_DATE to now):" >> $REPORT_FILE
              CHANGELOG=$(git log --since="$LAST_RELEASE_DATE" --no-merges --pretty=format:"%ad - %h - %s" --date=format:'%Y-%m-%d %H:%M:%S' | grep -v "Auto-generated SQL bundle")
          fi
          
          if [ -n "$CHANGELOG" ]; then
              echo "$CHANGELOG" >> $REPORT_FILE
          else
              echo "*No new commits found.*" >> $REPORT_FILE
          fi
          
          # Final Summary Logic
          echo -e "\n**Processing Results:**" >> $GITHUB_STEP_SUMMARY
          echo "- Stored Procedures added: $SP_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- Data scripts diffed: $DATA_COUNT" >> $GITHUB_STEP_SUMMARY
          
          # Finalize Logic
          if [[ "$SP_COUNT" -gt 0 || "$DATA_COUNT" -gt 0 ]]; then
            echo "-- End of changes" >> "$TEMP_SQL"
            echo "GO" >> "$TEMP_SQL" # Safety
            
            mkdir -p "$DIR_OUTPUT"
            mv "$TEMP_SQL" "$FULL_PATH"
            echo "Output SQL file: [${FINAL_FILENAME}](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/${FULL_PATH})" >> $GITHUB_STEP_SUMMARY
          else
            echo "No changes found. Nothing to output." >> $GITHUB_STEP_SUMMARY
          fi
          
          cat "$REPORT_FILE" >> $GITHUB_STEP_SUMMARY
          rm "$REPORT_FILE"
          
          if [ $ERRORS -gt 0 ]; then
              echo "- Validation Errors: $ERRORS" >> $GITHUB_STEP_SUMMARY
              echo "Script execution terminated due to validation failure."
              exit 1
          fi

          # Set output variables for use in subsequent steps
          echo "SP_COUNT=$SP_COUNT" >> $GITHUB_OUTPUT
          echo "DATA_COUNT=$DATA_COUNT" >> $GITHUB_OUTPUT
          echo "FINAL_FILENAME=$FINAL_FILENAME" >> $GITHUB_OUTPUT
      
      # - name: Upload Combined Artifacts
        # if: always() && (steps.process_sql.outputs.SP_COUNT > 0 || steps.process_sql.outputs.DATA_COUNT > 0)
        # uses: actions/upload-artifact@v7
        # with:
          # name: release-artifacts
          # path: |
            # ${{ env.REPORT_FILE }}
            # ${{ steps.process_sql.outputs.FINAL_FILENAME }}
          # if-no-files-found: ignore # Prevents errors if one path doesn't exist
          
      # - name: Commit to Release Branch
        # if: >
            # success() &&
            # (steps.process_sql.outputs.SP_COUNT > 0 || steps.process_sql.outputs.DATA_COUNT > 0)
        # uses: stefanzweifel/git-auto-commit-action@v7
        # with:
          # branch: ${{ github.ref_name }}
          # commit_message: "Auto-generated SQL bundle (Release) [SP: ${{ steps.process_sql.outputs.SP_COUNT }}, Data: ${{ steps.process_sql.outputs.DATA_COUNT }}]"
          # file_pattern: '${{ env.DIR_OUTPUT }}/*.sql'

      - name: Commit SQL bundle to Release Branch
        if: >
          success() &&
          (steps.process_sql.outputs.SP_COUNT > 0 || steps.process_sql.outputs.DATA_COUNT > 0)
        id: deploy_sql
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local --unset-all http.https://github.com/.extraheader || true
          
          # 1. Configure local git for the runner
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Stage the new SQL file
          git add "${{ env.DIR_OUTPUT }}/*.sql"
          git commit -m "Auto-generated SQL bundle (Release) [SP: ${{ steps.process_sql.outputs.SP_COUNT }}, Data: ${{ steps.process_sql.outputs.DATA_COUNT }}]"

          # 3. Attempt direct push
          echo "Attempting direct push to ${{ github.ref_name }}..."
          if git push origin ${{ github.ref_name }}; then
            echo "SUCCESS: Direct commit pushed to protected branch (Permissions allowed it)."
            echo "deploy_status=committed" >> $GITHUB_OUTPUT
          else
            echo "NOTICE: Direct push failed (Likely Branch Protection). Falling back to PR mode."
            echo "deploy_status=needs_pr" >> $GITHUB_OUTPUT
          fi

      - name: Create and Auto-Merge PR (if commit failed)
        if: steps.deploy_sql.outputs.deploy_status == 'needs_pr'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "auto-sql-bundle-${{ steps.process_sql.outputs.FINAL_FILENAME }}"
          delete-branch: true
          title: "SQL Release Bundle: ${{ steps.process_sql.outputs.FINAL_FILENAME }}"
          commit-message: "Auto-generated SQL bundle (Release) [SP: ${{ steps.process_sql.outputs.SP_COUNT }}, Data: ${{ steps.process_sql.outputs.DATA_COUNT }}]"
          base: ${{ github.ref_name }}
          body: "Automated PR created due to branch protection on ${{ github.ref_name }}."

      - name: Enable Automerge and Finalize
        if: steps.cpr.outputs.pull-request-operation == 'created'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          echo "Enabling auto-merge for PR #$PR_NUMBER..."
          
          # Attempt to enable auto-merge (requires repo setting 'Allow auto-merge' to be ON)
          if gh pr merge "$PR_NUMBER" --merge --auto; then
            echo "SUCCESS: Auto-merge enabled for PR #$PR_NUMBER."
          else
            echo "::error::Warning: Failed to enable auto-merge for PR #$PR_NUMBER. Manually merge the PR."
            echo "Failed to auto-merge PR. Merge it manually - [Pull Request #${{ steps.cpr.outputs.pull-request-number }}](${{ steps.cpr.outputs.pull-request-url }})" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi