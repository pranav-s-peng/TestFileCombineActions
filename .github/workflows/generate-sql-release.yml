name: Generate SQL Release Bundle

on:
  pull_request:
    branches:
      - '*_Release'  # Matches DEV_Release, SIT_Release.
      - Release
    types: [closed]
  workflow_dispatch: # This enables the manual "Run" button
    inputs:
      fake_run:
        description: 'Fake Run (Create artifact, NO commit/push)'
        type: boolean
        default: false
      output_to_artifact:
        description: 'Output Report to Artifact (Instead of Summary)'
        type: boolean
        default: false
      commit_to:
        description: 'Commits to (0 - Release & main [default], 1 - Release only, 2 - main only)'
        type: integer
        default: 0
      file_description:
        description: 'Suffix for the filename (Optional)'
        type: string
        required: false
        
jobs:
  generate-bundle:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      
    env:
      # Directories that will be checked/used
      
      # SP scripts folder to search.
      DIR_SP: "SP"
      # Data scripts folder to search.
      DIR_DATA: "Data"
      # Where to output final file.
      DIR_OUTPUT: "Output"
      
      # Placeholders - no need to change
      TEMP_SQL: "temp_bundle.sql"
      REPORT_FILE: "summary_report.md"
      REPO_NAME: ${{ github.event.repository.name }}
      
      # Inputs to workflow
      INPUT_FAKE_RUN: ${{ github.event.inputs.fake_run }}
      INPUT_TO_ARTIFACT: ${{ github.event.inputs.output_to_artifact }}
      INPUT_COMMIT_TO: ${{ github.event.inputs.commit_to || 0 }}
      INPUT_DESCRIPTION: ${{ github.event.inputs.file_description }}
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          # Removed since we r regexing for release branches
          #ref: Release  # Ensure we are working on the Release branch files
          fetch-depth: 0 # This fetches all branches and history

      - name: Process SQL Changes
        id: process_sql
        shell: bash
        run: |
        
          # Initialize Report and Temp SQL file
          touch $TEMP_SQL

          # Initialize report
          echo "### SQL Processing Report" > $REPORT_FILE
          echo "| File Type | Status | File Name |" >> $REPORT_FILE
          echo "| :--- | :--- | :--- |" >> $REPORT_FILE

          # Handle Git History safely
          # Only unshallow if the repo actually is shallow
          if [ -f .git/shallow ]; then
            git fetch --unshallow --tags
          else
            git fetch --all --tags
          fi
          
          LAST_RELEASE_TS=""

          # Check for Output folder without triggering ls immediately
          if [ -d "$DIR_OUTPUT" ]; then
              echo "Output directory '$DIR_OUTPUT' exists."
              
              # Get the newest file by name into a variable safely
              # 2>/dev/null hides the error if the folder is empty
              LAST_FILE=$(ls -1 "$DIR_OUTPUT" 2>/dev/null | grep "__" | sort -r | head -n 1 || echo "")
              
              if [ -n "$LAST_FILE" ]; then
                  echo "Found last release: $LAST_FILE"
                  RAW_TS=$(echo "$LAST_FILE" | cut -d'_' -f1)
                  
                  # Reformat for Git: YYYY-MM-DD HH:MM:SS
                  LAST_RELEASE_TS="${RAW_TS:0:4}-${RAW_TS:4:2}-${RAW_TS:6:2} ${RAW_TS:8:2}:${RAW_TS:10:2}:${RAW_TS:12:2}"
                  echo "Last release timestamp detected: $LAST_RELEASE_TS"
              else
                  echo "Output folder '$DIR_OUTPUT' exists but no SQL bundle found."
              fi
          else
              echo "Output folder '$DIR_OUTPUT' does not exist yet."
          fi
          
          TIMESTAMP=$(date +"%Y%m%d%H%M%S")
          
          DESC_SUFFIX=""
          if [ -n "$INPUT_DESCRIPTION" ]; then
             DESC_SUFFIX="_$INPUT_DESCRIPTION"
          fi
          FINAL_FILENAME="${TIMESTAMP}__${REPO_NAME}${DESC_SUFFIX}.sql"
          FULL_PATH="${DIR_OUTPUT}/${FINAL_FILENAME}"
          
          if [ "$INPUT_FAKE_RUN" != "true" ]; then
            mkdir -p "$DIR_OUTPUT"
          fi

          # Identify changed files
          if [ -z "$LAST_RELEASE_TS" ]; then
              echo "Result: Processing all history."
              # Use the range syntax for first run
              START_POINT=$(git rev-list --max-parents=0 HEAD)
              FILES=$(git log "$START_POINT..HEAD" --name-only --pretty=format: | sort -u)
              COMMIT_TITLES=$(git log "$START_POINT..HEAD" --no-merges --pretty=format:"* [\`%h\`](https://github.com/${{ github.repository }}/commit/%H) - %s" | grep -v "Auto-generated SQL bundle" | sort -u)
          else
              echo "Result: Processing since $LAST_RELEASE_TS"
              # Use the --since flag with strict quotes for subsequent runs
              FILES=$(git log --since="$LAST_RELEASE_TS" --name-only --pretty=format: | sort -u)
              COMMIT_TITLES=$(git log --since="$LAST_RELEASE_TS" --no-merges --pretty=format:"* [\`%h\`](https://github.com/${{ github.repository }}/commit/%H) - %s" | grep -v "Auto-generated SQL bundle" | sort -u)
          fi

          # Initialize counters
          SP_COUNT=0
          DATA_COUNT=0
          ERRORS=0

          for FILE in $FILES; do
              # Skip if file doesn't exist (deleted) or isn't in our target folders
              if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then continue; fi
              
              # --- STORED PROCEDURES ---
              if [[ $FILE == *"$DIR_SP/"* && $FILE == *.sql ]]; then
                  # Clean Windows line endings for reliable regex matching
                  CONTENT=$(cat "$FILE" | tr -d '\r' | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}')
                  
                  # Validation for CREATE OR ALTER PROCEDURE
                  if [[ ! "$CONTENT" =~ ([[:space:]]*(GO)?)*[[:space:]]*CREATE[[:space:]]+OR[[:space:]]+ALTER[[:space:]]+PROCEDURE ]]; then
                      echo "| SP | FAILED | $FILE |" >> $REPORT_FILE
                      echo "::error::Validation Failed: File '$FILE' is missing 'CREATE OR ALTER PROCEDURE'."
                      ERRORS=$((ERRORS + 1))
                      continue
                  fi

                  # Remove leading n trailing GOs, newlines from start and end only (Case Insensitive)
                  CLEAN_CONTENT=$(echo "$CONTENT" | sed -e :a -e '/^\([[:space:]]*GO[[:space:]]*\|[[:space:]]*\)$/I{N;ba' -e '}' | sed -e :a -e '/^\([[:space:]]*GO[[:space:]]*\|[[:space:]]*\)$/I{$d;N;ba' -e '}')
                  {
                      echo "-- $DIR_SP/$(basename "$FILE")"
                      # We ONLY echo GO if the CLEAN_CONTENT doesn't already start with one
                      [[ ! "$CLEAN_CONTENT" =~ ^[[:space:]]*GO ]] && echo "GO"
                      echo "$CLEAN_CONTENT"
                      echo "" # Single newline for separation
                  } >> "$TEMP_SQL"
                  
                  SP_COUNT=$((SP_COUNT + 1))
                  echo "| SP | Added | $FILE |" >> $REPORT_FILE

              # --- DATA SCRIPTS (Data/ folder) ---
              elif [[ $FILE == *"$DIR_DATA/"* && $FILE == *.sql ]]; then
                  # Get just the diffs since that timestamp
                  # Inside the Data loop
                  if [ -z "$LAST_RELEASE_TS" ]; then
                      RAW_DIFF=$(git log "$START_POINT..HEAD" -p --unified=0 -I$'\r' --ignore-cr-at-eol "$FILE")
                  else
                      RAW_DIFF=$(git log --since="$LAST_RELEASE_TS" -p --unified=0 -I$'\r' --ignore-cr-at-eol "$FILE")
                  fi
                  
                  DIFF_CHANGES=$(echo "$RAW_DIFF" | tail -n +5 | grep -E "^\+" | grep -Ev '^\+\+\+' | sed 's/^\+//g' | tr -d '\r' | sed 's/[[:space:]]*$//')
                  
                  if [ -n "$DIFF_CHANGES" ]; then
                      # Strip leading/trailing GOs from the diff only
                      CLEAN_DIFF=$(echo "$DIFF_CHANGES" | sed -e :a -e '/^\([[:space:]]*GO[[:space:]]*\|[[:space:]]*\)$/I{N;ba' -e '}' | sed -e :a -e '/^\([[:space:]]*GO[[:space:]]*\|[[:space:]]*\)$/I{$d;N;ba' -e '}')
                      
                      {
                          echo "-- $DIR_DATA/$(basename "$FILE") (Diff)"
                          [[ ! "$CLEAN_DIFF" =~ ^[[:space:]]*GO ]] && echo "GO"
                          echo "$CLEAN_DIFF"
                          echo "" # Single newline for separation
                      } >> "$TEMP_SQL"
                      
                      DATA_COUNT=$((DATA_COUNT + 1))
                      echo "| Data | Diffed | $FILE |" >> $REPORT_FILE
                  fi
              fi
          done

          # BUILD CHANGELOG (Requested Format)
          echo -e "\n### Changelog (since last release on $LAST_RELEASE_TS):" >> $REPORT_FILE
          
          # Format: <date> - <commit hash> - <commit msg>
          if [ -z "$LAST_RELEASE_TS" ]; then
              CHANGELOG=$(git log "$START_POINT..HEAD" --no-merges --pretty=format:"%ad - %h - %s" --date=format:'%Y-%m-%d %H:%M:%S' | grep -v "Auto-generated SQL bundle")
          else
              CHANGELOG=$(git log --since="$LAST_RELEASE_TS" --no-merges --pretty=format:"%ad - %h - %s" --date=format:'%Y-%m-%d %H:%M:%S' | grep -v "Auto-generated SQL bundle")
          fi
          
          if [ -n "$CHANGELOG" ]; then
              echo "$CHANGELOG" >> $REPORT_FILE
          else
              echo "*No new commits found.*" >> $REPORT_FILE
          fi
          
          # Final Summary Logic
          echo -e "\n**Processing Results:**" >> $GITHUB_STEP_SUMMARY
          echo "- Stored Procedures added: $SP_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- Data scripts diffed: $DATA_COUNT" >> $GITHUB_STEP_SUMMARY
          
          # Finalize Logic
          if [[ "$SP_COUNT" -gt 0 || "$DATA_COUNT" -gt 0 ]]; then
            echo "-- End of changes" >> "$TEMP_SQL"
            echo "GO" >> "$TEMP_SQL" # Safety
            
            if [ "$INPUT_FAKE_RUN" == "true" ]; then
               mv "$TEMP_SQL" "$FINAL_FILENAME"
               echo "FAKE_RUN=true" >> $GITHUB_OUTPUT
               echo -e "\n**[!] FAKE RUN: SQL file saved as artifact only.**" >> $REPORT_FILE
            else
               mkdir -p "$DIR_OUTPUT"
               mv "$TEMP_SQL" "$FULL_PATH"
               echo "FAKE_RUN=false" >> $GITHUB_OUTPUT
               echo "Output SQL file: [${FINAL_FILENAME}](https://github.com/${{ github.repository }}/blob/Release/${FULL_PATH})" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "FAKE_RUN=false" >> $GITHUB_OUTPUT
            echo "No changes found. Nothing to output." >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "$INPUT_TO_ARTIFACT" == "true" ]; then
             echo "REPORT_TO_ARTIFACT=true" >> $GITHUB_OUTPUT
             echo "Detailed report has been moved to artifacts." >> $GITHUB_STEP_SUMMARY
          else
             cat "$REPORT_FILE" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ $ERRORS -gt 0 ]; then
              echo "- Validation Errors: $ERRORS" >> $GITHUB_STEP_SUMMARY
              echo "Script execution terminated due to validation failure."
              exit 1
          fi

          # Set output variables for use in subsequent steps
          echo "SP_COUNT=$SP_COUNT" >> $GITHUB_OUTPUT
          echo "DATA_COUNT=$DATA_COUNT" >> $GITHUB_OUTPUT
          echo "FINAL_FILENAME=$FINAL_FILENAME" >> $GITHUB_OUTPUT
      
      - name: Upload Combined Artifacts
        if: always() && (steps.process_sql.outputs.SP_COUNT > 0 || steps.process_sql.outputs.DATA_COUNT > 0)
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            ${{ env.REPORT_FILE }}
            ${{ steps.process_sql.outputs.FINAL_FILENAME }}
          if-no-files-found: ignore # Prevents errors if one path doesn't exist
          
      # Step for: 0 - Release only OR 1 - Release & main
      - name: Commit to Release Branch
        if: success() && github.event.inputs.fake_run != 'true' && (env.INPUT_COMMIT_TO == '0' || env.INPUT_COMMIT_TO == '1') && (steps.process_sql.outputs.SP_COUNT > 0 || steps.process_sql.outputs.DATA_COUNT > 0)
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: Release
          commit_message: "Auto-generated SQL bundle (Release) [SP: ${{ steps.process_sql.outputs.SP_COUNT }}, Data: ${{ steps.process_sql.outputs.DATA_COUNT }}]"
          file_pattern: '${{ env.DIR_OUTPUT }}/*.sql'
          
      # Step for: 1 - Release & main OR 2 - main only
      - name: Commit to Main Branch
        if: success() && github.event.inputs.fake_run != 'true' && (env.INPUT_COMMIT_TO == '0' || env.INPUT_COMMIT_TO == '2') && (steps.process_sql.outputs.SP_COUNT > 0 || steps.process_sql.outputs.DATA_COUNT > 0)
        id: push_to_main
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          commit_message: "Auto-generated SQL bundle (Main) [SP: ${{ steps.process_sql.outputs.SP_COUNT }}, Data: ${{ steps.process_sql.outputs.DATA_COUNT }}]"
          file_pattern: '${{ env.DIR_OUTPUT }}/${{ steps.process_sql.outputs.FINAL_FILENAME }}'

      # Alternative create PR instead of committing to main branch (branch protection case)
      - name: Create PR to Main
        if: success() && steps.push_to_main.outcome == 'failure' && github.event.inputs.fake_run != 'true' && (env.INPUT_COMMIT_TO == '0' || env.INPUT_COMMIT_TO == '2') && (steps.process_sql.outputs.SP_COUNT > 0 || steps.process_sql.outputs.DATA_COUNT > 0)
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync-sql-bundle-${{ github.run_id }} # Unique branch name
          base: main
          title: "SQL Bundle: ${{ steps.process_sql.outputs.FINAL_FILENAME }}"
          body: "Since main branch has branch protection, this is an automated PR containing the latest SQL release bundle generated from the Release branch."
          commit-message: "Add auto-generated SQL bundle for main"
          add-paths: |
            ${{ env.DIR_OUTPUT }}/${{ steps.process_sql.outputs.FINAL_FILENAME }}
          delete-branch: true # Deletes the temporary branch once merged
            